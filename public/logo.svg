<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Concept 2: Bird perched on a golf flag pin -->
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Flag pole -->
  <line x1="50" y1="36" x2="50" y2="105" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Flag -->
  <path d="M50 36 L78 46 L50 56 Z" fill="url(#g2)"/>
  <!-- Bird perched on top of pole — small, clean side-profile -->
  <g transform="translate(50, 36) scale(0.55) translate(-50, -50)">
    <!-- Body -->
    <ellipse cx="50" cy="42" rx="9" ry="7" fill="#22c55e" transform="rotate(-10 50 42)"/>
    <!-- Head -->
    <circle cx="57" cy="35" r="6" fill="#22c55e"/>
    <!-- Beak -->
    <path d="M62 34 L68 36 L62 38 Z" fill="#f59e0b"/>
    <!-- Eye -->
    <circle cx="59" cy="34" r="1.5" fill="white"/>
    <circle cx="59.4" cy="33.8" r="0.8" fill="#111827"/>
    <!-- Wing -->
    <path d="M44 39 Q39 36 36 39 Q39 41 44 42" fill="#16a34a"/>
    <!-- Tail -->
    <path d="M41 44 L33 40 L35 44 L31 42 L35 46 Z" fill="#16a34a"/>
    <!-- Feet -->
    <path d="M47 48 L50 50 L53 48" fill="none" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Ground/green -->
  <ellipse cx="50" cy="108" rx="26" ry="5" fill="#bbf7d0" opacity="0.6"/>
  <!-- Hole -->
  <ellipse cx="50" cy="108" rx="7" ry="2.5" fill="#374151" opacity="0.3"/>
  <!-- Text -->
  <text x="108" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#111827">Birdie</text>
  <text x="190" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#22c55e">Vantage</text>
  <text x="110" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" letter-spacing="2">GOLF DFS OPTIMIZER</text>
</svg>